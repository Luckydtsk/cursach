{% extends 'base.html' %}

{% block title %}Создание проекта - Система учета{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Создание проекта</h1>
    <a href="{{ url_for('projects.list_projects') }}" class="btn btn-secondary">Назад к списку</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('projects.create_project') }}">
        <div class="form-group">
            <label class="form-label">Название проекта *</label>
            <input type="text" name="title" class="form-control" required placeholder="Введите название проекта"
                   value="{{ form_data.title or '' }}">
        </div>
        
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" placeholder="Опишите цели и задачи проекта">{{ form_data.description or '' }}</textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Дата начала *</label>
                <input type="date" name="start_date" class="form-control" required
                       value="{{ form_data.start_date or '' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label">Дата окончания *</label>
                <input type="date" name="end_date" class="form-control" required
                       value="{{ form_data.end_date or '' }}">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select name="status_id" class="form-control">
                    <option value="">Выберите статус</option>
                    {% for status in statuses %}
                    <option value="{{ status.id }}" {% if form_data.status_id and form_data.status_id|int == status.id %}selected{% endif %}>
                        {{ status.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            {% if current_user.role == ROLE_ADMIN %}
                <div class="form-group">
                    <label class="form-label">Руководитель</label>
                    <select name="supervisor_id" class="form-control">
                        <option value="">Выберите руководителя</option>
                        {% for teacher in teachers %}
                        <option value="{{ teacher.id }}" {% if form_data.supervisor_id and form_data.supervisor_id|int == teacher.id %}selected{% endif %}>
                            {{ teacher.full_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            {% endif %}
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Создать проект</button>
            <a href="{{ url_for('projects.list_projects') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
