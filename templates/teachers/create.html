{% extends 'base.html' %}

{% block title %}Добавление преподавателя - Система учета{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Добавление преподавателя</h1>
    <a href="{{ url_for('teachers.list_teachers') }}" class="btn btn-secondary">Назад к списку</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('teachers.create_teacher') }}">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Фамилия *</label>
                <input type="text" name="last_name" class="form-control" required placeholder="Петров">
            </div>
            
            <div class="form-group">
                <label class="form-label">Имя *</label>
                <input type="text" name="first_name" class="form-control" required placeholder="Петр">
            </div>
            
            <div class="form-group">
                <label class="form-label">Отчество</label>
                <input type="text" name="middle_name" class="form-control" placeholder="Петрович">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-control" required placeholder="petrov@university.ru">
            </div>
            
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="tel" name="phone" class="form-control" placeholder="+7-999-000-0000">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Должность</label>
                <input type="text" name="position" class="form-control" placeholder="Доцент">
            </div>
            
            <div class="form-group">
                <label class="form-label">Кафедра</label>
                <select name="department_id" class="form-control">
                    <option value="">Выберите кафедру</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Добавить преподавателя</button>
            <a href="{{ url_for('teachers.list_teachers') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
