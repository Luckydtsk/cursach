{% extends 'base.html' %}

{% block title %}Добавление студента - Система учета{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Добавление студента</h1>
    <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">Назад к списку</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('students.create_student') }}">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Фамилия *</label>
                <input type="text" name="last_name" class="form-control" required placeholder="Иванов">
            </div>
            
            <div class="form-group">
                <label class="form-label">Имя *</label>
                <input type="text" name="first_name" class="form-control" required placeholder="Иван">
            </div>
            
            <div class="form-group">
                <label class="form-label">Отчество</label>
                <input type="text" name="middle_name" class="form-control" placeholder="Иванович">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-control" required placeholder="ivanov@student.ru">
            </div>
            
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="tel" name="phone" class="form-control" placeholder="+7-900-000-0000">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Группа</label>
            <select name="student_group_id" class="form-control">
                <option value="">Выберите группу</option>
                {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }} ({{ group.course }} курс)</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Добавить студента</button>
            <a href="{{ url_for('students.list_students') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
