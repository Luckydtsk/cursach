{% extends 'base.html' %}

{% block title %}Создание задачи - Система учета{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Создание задачи</h1>
    <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-secondary">Назад к списку</a>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('tasks.create_task') }}">
        <div class="form-group">
            <label class="form-label">Название задачи *</label>
            <input type="text" name="title" class="form-control" required placeholder="Введите название задачи">
        </div>
        
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" placeholder="Опишите задачу"></textarea>
        </div>
        
        <div class="form-group">
            <label class="form-label">Проект *</label>
            <select name="project_id" class="form-control" required>
                <option value="">Выберите проект</option>
                {% for project in projects %}
                <option value="{{ project.id }}" {% if selected_project_id == project.id %}selected{% endif %}>
                    {{ project.title }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select name="status_id" class="form-control">
                    {% for status in statuses %}
                    <option value="{{ status.id }}" {% if loop.first %}selected{% endif %}>{{ status.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Приоритет (1-5)</label>
                <select name="priority" class="form-control">
                    <option value="1">1 - Низкий</option>
                    <option value="2">2</option>
                    <option value="3" selected>3 - Средний</option>
                    <option value="4">4</option>
                    <option value="5">5 - Высокий</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Дедлайн</label>
                <input type="date" name="deadline" class="form-control">
            </div>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Создать задачу</button>
            <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
